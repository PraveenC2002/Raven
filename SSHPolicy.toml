[DenyList]
  	exact = [
    	"/etc/shadow",
     	"/etc/gshadow",
      	"/etc/sudoers",
   	]
    patterns = [
    	'/etc/sudoers\.d/',
     	'/proc/self/environ$',
      	'/proc/[0-9]+/environ$',
       	'/\.ssh/',
        '/\.env($|\.)',
        '\.(key|pem|p12|pfx)$',
        '/id_(rsa|ed25519|ecdsa|dsa)($|\.)',
        '/etc/ssh/ssh_host_\w+_key$',
        '/\.bash_history$',
        '/\.zsh_history$',
    ]

# Identity and context

[[commands]]
	name = "pwd"
	description = "print working directory"
	template = "pwd"

[[commands]]
	name = "whoami"
	description = "print current user"
	template = "whoami"

[[commands]]
	name = "hostname"
	description = "print machine's hostname"
	template = "hostname"

[[commands]]
	name = "uname"
	description = "kernel and architecture info"
	[[commands.flags]]
		name = '-a'
	template = "uname {{flag -a}}"

[[commands]]
	name = "date"
	description = "current date and time"
	template = "date"

[[commands]]
	name = "uptime"
	description = "how long the system has been running and average load"
	template = "uptime"

# file reading
[[commands]]
	name = "cat"
	description = "print file contents to stdout"
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "cat {{pos 1}}"

[[commands]]
	name = "head"
	description = "print first 10 lines (default) of file to stdout"
	[[commands.flags]]
		name = '-n'
		takesVal = true
		value = '^[1-9][0-9]*$'
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "head {{flag -n}} {{pos 1}}"

[[commands]]
	name = "tail"
	description = "print last 10 lines (default) of file to stdout"
	[[commands.flags]]
		name = '-n'
		takesVal = true
		value = '^[1-9][0-9]*$'
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "tail {{flag -n}} {{pos 1}}"

[[commands]]
	name = "wc"
	description = "count lines, words and bytes"
	[[commands.flags]]
		name = '-l'
	[[commands.flags]]
		name = '-w'
	[[commands.flags]]
		name = '-c'
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "wc {{flag -l -w -c}} {{pos 1}}"

[[commands]]
	name = "ls"
	description = "lists directory contents"
	[[commands.flags]]
		name = '-l'
	[[commands.flags]]
		name = '-a'
	[[commands.flags]]
		name = '-h'
	[[commands.flags]]
		name = '-t'
	[[commands.flags]]
		name = '-la'
	[[commands.flags]]
		name = '-lah'
	[[commands.flags]]
		name = '-lath'
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "ls {{flag -l -a -h -t -la -lah -lath}} {{pos 1}}"

[[commands]]
	name = "grep"
	description = "print lines from a file (or recursively across files) that match a pattern"
	[[commands.flags]]
		name = '-i'
	[[commands.flags]]
		name = '-n'
	[[commands.flags]]
		name = '-r'
	[[commands.flags]]
		name = '-v'
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^[a-zA-Z0-9_ .\-]+$']
	[[commands.positionals]]
		index = 2
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "grep {{flag -i -n -r -v}} {{pos 1 2}}"

[[commands]]
	name = "find"
	description = "walks the filesystem starting from <path> and prints any file matching the given conditions."
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
		pos = 1
	[[commands.flags]]
		name = "-name"
		takesVal = true
		value = '^[a-zA-Z0-9_*.\-]+$'
		pos = 2
	[[commands.flags]]
		name = "-type"
		takesVal = true
		value = '^(f|d)$'
		pos = 3
	[[commands.flags]]
		name = "-mtime"
		takesVal = true
		value = '^[1-9][0-9]*$'
		pos = 4
	template = "find {{pos 1}} {{flag -name -type -mtime}}"

[[commands]]
	name = "file"
	description = "identifies file type"
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "file {{pos 1}}"

# System V Style (SysV) not BSD
[[commands]]
	name = "ps"
	description = "gives a snapshot of the running process"
	[[commands.flags]]
		name = '-e'
	[[commands.flags]]
		name = '-f'
	[[commands.flags]]
		name = "-p"
		takesVal = true
		value = '^[1-9][0-9]*$'
	[[commands.flags]]
		name = "-C"
		takesVal = true
		value = '^[a-zA-Z0-9_\-]+$'
	[[commands.flags]]
		name = "-o"
		takesVal = true
		value = '^[a-z%,]+$'
	[[commands.flags]]
		name = "--sort"
		takesVal = true
		glued = true
		value = '^-?(%cpu|%mem|rss|vsz|pid|time)$'
	template = "ps {{flag -e -f -p -C -o --sort}}"

[[commands]]
	name = "pgrep"
	description = "search for processes whose name matches and print their PIDs"
	[[commands.flags]]
		name = '-f'
	[[commands.flags]]
		name = '-l'
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^[a-zA-Z0-9_\-]+$']
	template = "pgrep {{flag -f -l}} {{pos 1}}"

[[commands]]
	name = "pidof"
	description = "older sibling of pgrep"
	[[commands.positionals]]
		index = 1
		required = true
		acceptPattern = ['^[a-zA-Z0-9_\-]+$']
	template = "pidof {{pos 1}}"

[[commands]]
	name = "id"
	description = "prints your UID, primary GID, and all supplementary groups"
	[[commands.flags]]
		name = '-u'
	[[commands.flags]]
		name = '-g'
	[[commands.flags]]
		name = '-G'
	[[commands.flags]]
		name = '-n'
	[[commands.positionals]]
		index = 1
		required = false
		acceptPattern = ['^[a-zA-Z0-9_*.\-]+$']
	template = "id {{flag -u -g -G -n}} {{pos 1}}"

[[commands]]
	name = "groups"
	description = "lists your current groups"
	[[commands.positionals]]
		index = 1
		required = false
		acceptPattern = ['^[a-zA-Z0-9_*.\-]+$']
	template = "groups {{pos 1}}"

[[commands]]
	name = "stat"
	description = "returns file information"
	[[commands.positionals]]
		index = 1
		required = false
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "stat {{pos 1}}"

[[commands]]
	name = "getfacl"
	description = "extended ACLs"
	[[commands.positionals]]
		index = 1
		required = false
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "getfacl {{pos 1}}"

[[commands]]
    name = "systemctl"
    description = "query systemd service state (read-only subcommands only).\n No pager flag for this command is applied by default, you don't need to pass it separately in function call."
    [[commands.flags]]
    	name = '--all'
    [[commands.flags]]
        name = '--type'
        takesVal = true
        glued = true
        value = '^(service|target|timer|socket|mount|path)$'
    [[commands.flags]]
      	name = '--state'
       	takesVal = true
        glued = true
        value = '^(failed|active|inactive|activating|deactivating)$'
    [[commands.positionals]]
    	index = 1
        required = true
        acceptPattern = ['^(status|is-active|is-enabled|is-failed|show|cat|list-units|list-unit-files|list-dependencies)$']
    [[commands.positionals]]
    	index = 2
        required = false
        acceptPattern = ['^[a-zA-Z0-9_@.\-]+$']
    template = "systemctl --no-pager {{flag --all --type --state}} {{pos 1 2}}"

[[commands]]
    name = "journalctl"
    description = "Query the systemd journal.\nNo pager flag for this command is applied by default, you don't need to pass it separately in function call."
    [[commands.flags]]
    	name = '-b'
    [[commands.flags]]
    	name = '-r'
    [[commands.flags]]
    	name = '-k'
    [[commands.flags]]
      	name = '-u'
       	takesVal = true
        value = '^[a-zA-Z0-9_@.\-]+$'
    [[commands.flags]]
        name = '-n'
        takesVal = true
        value = '^[1-9][0-9]*$'
    [[commands.flags]]
        name = '-p'
        takesVal = true
        value = '^(emerg|alert|crit|err|warning|notice|info|debug)$'
    [[commands.flags]]
        name = '--since'
        takesVal = true
        glued = true
        value = '^(-[1-9][0-9]*[smhd]|[0-9]{4}-[0-9]{2}-[0-9]{2}(T[0-9]{2}:[0-9]{2}:[0-9]{2})?)$'
    [[commands.flags]]
        name = '--until'
        takesVal = true
        glued = true
        value = '^(-[1-9][0-9]*[smhd]|[0-9]{4}-[0-9]{2}-[0-9]{2}(T[0-9]{2}:[0-9]{2}:[0-9]{2})?)$'
    [[commands.flags]]
        name = '--output'
        takesVal = true
        glued = true
        value = '^(short|cat|json|json-pretty|verbose)$'
    template = "journalctl --no-pager {{flag -b -r -k -u -n -p --since --until --output}}"

[[commands]]
	name = "dmesg"
	description = "Kernel ring buffer.\nNo pager flag for this command is applied by default, you don't need to pass it separately in function call."
	[[commands.flags]]
		name = '-T'
	[[commands.flags]]
		name = '-d'
	[[commands.flags]]
		name = '-t'
	[[commands.flags]]
		name = '-k'
	[[commands.flags]]
		name = '-u'
	[[commands.flags]]
		name = '-x'
	[[commands.flags]]
		name = '-e'
	[[commands.flags]]
		name = '-r'
	[[commands.flags]]
		name = '-P'
	[[commands.flags]]
		name = '--nopager'
	[[commands.flags]]
		name = "-l"
		takesVal = true
		value = '^(emerg|alert|crit|err|warn|notice|info|debug)(,(emerg|alert|crit|err|warn|notice|info|debug))*$'
	[[commands.flags]]
		name = "--level"
		takesVal = true
		value = '^(emerg|alert|crit|err|warn|notice|info|debug)(,(emerg|alert|crit|err|warn|notice|info|debug))*$'
	[[commands.flags]]
		name = "-f"
		takesVal = true
		value = '^(kern|user|mail|daemon|auth|authpriv|syslog|lpr|news|uucp|cron|ftp|local0|local1|local2|local3|local4|local5|local6|local7)(,(kern|user|mail|daemon|auth|authpriv|syslog|lpr|news|uucp|cron|ftp|local[0-7]))*$'
	[[commands.flags]]
		name = "--facility"
		takesVal = true
		value = '^(kern|user|mail|daemon|auth|authpriv|syslog|lpr|news|uucp|cron|ftp|local0|local1|local2|local3|local4|local5|local6|local7)(,(kern|user|mail|daemon|auth|authpriv|syslog|lpr|news|uucp|cron|ftp|local[0-7]))*$'
  	[[commands.flags]]
   		name = "--time-format"
     	takesVal = true
      	value = '^(ctime|reltime|delta|notime|iso)$'
    template = "dmesg --nopager {{flag -T -d -t -k -u -x -e -r -P -l --level -f --facility --time-format}}"

