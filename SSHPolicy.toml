    name = "nft"
    description = "list nftables ruleset (read-only; needs root)"
    [[commands.positionals]]
    	index = 1
        required = true
        acceptPattern = ['^list$']
    [[commands.positionals]]
    	index = 2
        required = true
        acceptPattern = ['^(ruleset|tables|table|chains|chain)$']
    template = "nft {{pos 1 2}}"

[[commands]]
    name = "ufw"
    description = "show firewall status (read-only; needs root)"
    [[commands.positionals]]
    	index = 1
        required = true
        acceptPattern = ['^(status)$']
    template = "ufw {{pos 1}}"

[[commands]]
	name = "df"
	description = "Reports disk usage per mounted filesystem"
	[[commands.flags]]
		name = '-h'
	[[commands.flags]]
		name = '-i'
	[[commands.flags]]
		name = '-t'
	[[commands.flags]]
		name = '-a'
	[[commands.flags]]
		name = '-l'
	[[commands.positionals]]
		index = 1
		required = false
	 	acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "df {{flag -h -i -t -a -l}} {{pos 1}}"

[[commands]]
	name = "du"
	description = "Sums the size of files under a directory"
	[[commands.flags]]
		name = '-h'
	[[commands.flags]]
		name = '-s'
	[[commands.flags]]
		name = '-x'
	[[commands.flags]]
		name = "--max-depth"
		takesVal = true
		value = '^[0-9]+$'
	[[commands.positionals]]
		index = 1
		required = false
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "du {{flag -h -s -x --max-depth}} {{pos 1}}"

[[commands]]
	name = "lsof"
	description = "Lists open files"
	[[commands.flags]]
		name = '-n'
	[[commands.flags]]
		name = '-P'
	[[commands.flags]]
		name = "-p"
		takesVal = true
		value = '^[1-9][0-9]*$'
	[[commands.flags]]
		name = "-i"
		takesVal = true
		value = '^[a-zA-Z0-9:.@\-]+$'
	[[commands.flags]]
		name = "+L"
		takesVal = true
		glued = true
		value = '^[0-9]+$'
	[[commands.positionals]]
		index = 1
		required = false
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	template = "lsof {{flag -n -P -p -i +L}} {{pos 1}}"

[[commands]]
	name = "free"
	description = "Memory and swap usage"
	[[commands.flags]]
		name = '-h'
	[[commands.flags]]
		name = '-m'
	[[commands.flags]]
		name = '-g'
	[[commands.flags]]
		name = '-t'
	[[commands.flags]]
		name = '-w'
	template = "free {{flag -h -m -g -t -w}}"

[[commands]]
	name = "vmstat"
	description = "Virtual memory, cpu and io statistics"
	[[commands.flags]]
		name = '-a'
	[[commands.flags]]
		name = '-d'
	[[commands.flags]]
		name = '-s'
	[[commands.flags]]
		name = '-w'
	[[commands.flags]]
		name = "-S"
		takesVal = true
		value = '^(k|K|m|M)$'
	[[commands.positionals]]
		index = 1
		required = false
		acceptPattern = ['^[1-9][0-9]*$']
	[[commands.positionals]]
		index = 2
		required = false
		acceptPattern = ['^[1-9][0-9]*$']
	template = "vmstat {{flag -a -d -s -w -S}} {{pos 1 2}}"

[[commands]]
	name = "iostat"
	description = "Disk IO statistics"
	[[commands.flags]]
		name = '-x'
	[[commands.flags]]
		name = '-d'
	[[commands.flags]]
		name = '-c'
	[[commands.flags]]
		name = '-h'
	[[commands.flags]]
		name = '-m'
	[[commands.flags]]
		name = '-k'
	[[commands.flags]]
		name = '-t'
	[[commands.flags]]
		name = '-z'
	[[commands.positionals]]
		index = 1
		required = false
		acceptPattern = ['^[1-9][0-9]*$']
	[[commands.positionals]]
		index = 2
		required = false
		acceptPattern = ['^[1-9][0-9]*$']
	template = "iostat {{flag -x -d -c -h -m -k -t -z}} {{pos 1 2}}"

[[commands]]
	name = "lsblk"
	description = "Lists block devices"
	[[commands.flags]]
		name = '-f'
	[[commands.flags]]
		name = '-a'	
	[[commands.flags]]
		name = '-p'
	[[commands.flags]]
		name = '-m'
	[[commands.flags]]
		name = '-t'
	[[commands.flags]]
		name = "-o"
		takesVal = true
		value = '^[A-Z,]+$'
	template = "lsblk {{flag -f -a -p -m -t -o}}"

[[commands]]
	name = "findmnt"
	description = "Lists mounted filesystems"
	[[commands.flags]]
		name = '-A'
	[[commands.flags]]
		name = '-R'
	[[commands.flags]]
		name = '-D'
	[[commands.flags]]
		name = '-n'
	[[commands.flags]]
		name = "-t"
		takesVal = true
		value = '^[a-z0-9,.\-]+$'
	[[commands.flags]]
		name = "-T"
		takesVal = true
		value = '^/[a-zA-Z0-9_/.\-]+$'
	[[commands.flags]]
		name = "-S"
		takesVal = true
		value = '^[a-zA-Z0-9_/.:\-]+$'
	[[commands.positionals]]
		index = 1
		required = false
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
