[denylist]
  	exact = [
    	"/etc/shadow",
     	"/etc/gshadow",
      	"/etc/sudoers",
   	]
    patterns = [
    	'/etc/sudoers\.d/',
     	'/proc/self/environ$',
      	'/proc/[0-9]+/environ$',
       	'/\.ssh/',
        '/\.env($|\.)',
        '\.(key|pem|p12|pfx)$',
        '/id_(rsa|ed25519|ecdsa|dsa)($|\.)',
        '/etc/ssh/ssh_host_\w+_key$',
        '/\.bash_history$',
        '/\.zsh_history$',
    ]

[regexes]
	path = '^/[a-zA-Z0-9_/.\-]+$'
	positive_int = '^[1-9][0-9]*$'
	search_term = '^[a-zA-Z0-9_ .\-]+$'
	filename_glob = '^[a-zA-Z0-9_*.\-]+$'

# Identity and context

[[commands]]
	name = "pwd"
	description = "print working directory"

[[commands]]
	name = "whoami"
	description = "print current user"

[[commands]]
	name = "hostname"
	description = "print machine's hostname"

[[commands]]
	name = "uname"
	description = "kernel and architecture info"
	flags = ['-a']

[[commands]]
	name = "date"
	description = "current date and time"

[[commands]]
	name = "uptime"
	description = "how long the system has been running and average load"

# file reading
[[commands]]
	name = "cat"
	description = "print file contents to stdout"
	[[commands.positional]]
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']


[[commands]]
	name = "head"
	description = "print first 10 lines (default) of file to stdout"
	[[commands.flags]]
		name = '-n'
		takesVal = true
		value = '^[1-9][0-9]*$'
	[[commands.positional]]
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']


[[commands]]
	name = "tail"
	description = "print last 10 lines (default) of file to stdout"
	[[commands.flags]]
		name = '-n'
		takesVal = true
		value = '^[1-9][0-9]*$'
	[[commands.positional]]
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']

[[commands]]
	name = "wc"
	description = "count lines, words and bytes"
	flags = ['-l', '-w', '-c']
	[[commands.positional]]
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']

[[commands]]
	name = "ls"
	description = "lists directory contents"
	flags = ['-l', '-a', '-h', '-t', '-la', '-lah', '-lath']
	[[commands.positional]]
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']

[[commands]]
	name = "grep"
	description = "print lines from a file (or recursively across files) that match a pattern"
	flags = ['-i', '-n', '-r', '-v']
	[[commands.positional]]
		required = true
		acceptPattern = ['^[a-zA-Z0-9_ .\-]+$']
	[[commands.positional]]
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']

[[commands]]
	name = "find"
	description = "walks the filesystem starting from <path> and prints any file matching the given conditions."
	[[commands.positional]]
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']
	[[commands.flags]]
		name = "-name"
		takesVal = true
		value = '^[a-zA-Z0-9_*.\-]+$'
	[[commands.flags]]
		name = "-type"
		takesVal = true
		value = '^(f|d)$'
	[[commands.flags]]
		name = "-mtime"
		takesVal = true
		value = '^[1-9][0-9]*$'

[[commands]]
	name = "file"
	description = "identifies file type"
	[[commands.positional]]
		required = true
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']

# System V Style (SysV) not BSD
[[commands]]
	name = "ps"
	description = "gives a snapshot of the running process"
	flags = ['-e', '-f']
	[[commands.flags]]
		name = "-p"
		takesVal = true
		value = '^[1-9][0-9]*$'
	[[commands.flags]]
		name = "-C"
		takesVal = true
		value = '^[a-zA-Z0-9_\-]+$'
	[[commands.flags]]
		name = "-o"
		takesVal = true
		value = '^[a-z%,]+$'
	[[commands.flags]]
		name = "--sort"
		takesVal = true
		glued = true
		value = '^-?(%cpu|%mem|rss|vsz|pid|time)$'

[[commands]]
	name = "pgrep"
	description = "search for processes whose name matches and print their PIDs"
	flags = ['-f', '-l']
	[[commands.positional]]
		required = true
		acceptPattern = ['^[a-zA-Z0-9_\-]+$']

[[commands]]
	name = "pidof"
	description = "older sibling of pgrep"
	[[commands.positional]]
		required = true
		acceptPattern = ['^[a-zA-Z0-9_\-]+$']

[[commands]]
	name = "id"
	description = "prints your UID, primary GID, and all supplementary groups"
	flags = ['-u', '-g', '-G', '-n']
	[[commands.positional]]
		required = false
		acceptPattern = ['^[a-zA-Z0-9_*.\-]+$']

[[commands]]
	name = "groups"
	description = "lists your current groups"
	[[commands.positional]]
		required = false
		acceptPattern = ['^[a-zA-Z0-9_*.\-]+$']

[[commands]]
	name = "stat"
	description = "returns file information"
	[[commands.positional]]
		required = false
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']

[[commands]]
	name = "getfacl"
	description = "extended ACLs"
	[[commands.positional]]
		required = false
		acceptPattern = ['^/[a-zA-Z0-9_/.\-]+$']

[[commands]]
    name = "systemctl"
    description = "query systemd service state (read-only subcommands only)"
    flags = ['--no-pager', '--all']
    [[commands.flags]]
        name = '--type'
        takesVal = true
        glued = true
        value = '^(service|target|timer|socket|mount|path)$'
    [[commands.flags]]
      	name = '--state'
       	takesVal = true
        glued = true
        value = '^(failed|active|inactive|activating|deactivating)$'
    [[commands.positional]]
        required = true
        acceptPattern = ['^(status|is-active|is-enabled|is-failed|show|cat|list-units|list-unit-files|list-dependencies)$']
    [[commands.positional]]
        required = false
        acceptPattern = ['^[a-zA-Z0-9_@.\-]+$']

[[commands]]
    name = "journalctl"
    description = "query the systemd journal"
    flags = ['-b', '-r', '-k', '--no-pager']
    [[commands.flags]]
      	name = '-u'
       	takesVal = true
        value = '^[a-zA-Z0-9_@.\-]+$'
    [[commands.flags]]
        name = '-n'
        takesVal = true
        value = '^[1-9][0-9]*$'
    [[commands.flags]]
        name = '-p'
        takesVal = true
        value = '^(emerg|alert|crit|err|warning|notice|info|debug)$'
    [[commands.flags]]
        name = '--since'
        takesVal = true
        glued = true
        value = '^(-[1-9][0-9]*[smhd]|[0-9]{4}-[0-9]{2}-[0-9]{2}(T[0-9]{2}:[0-9]{2}:[0-9]{2})?)$'
    [[commands.flags]]
        name = '--until'
        takesVal = true
        glued = true
        value = '^(-[1-9][0-9]*[smhd]|[0-9]{4}-[0-9]{2}-[0-9]{2}(T[0-9]{2}:[0-9]{2}:[0-9]{2})?)$'
    [[commands.flags]]
        name = '--output'
        takesVal = true
        glued = true
        value = '^(short|cat|json|json-pretty|verbose)$'

[[commands]]
	name = "dmesg"
	description = "kernel ring buffer"
	flags = ['-T', '-d', '-t', '-k', '-u', '-x', '-e', '-r', '-P', '--nopager']
	[[commands.flags]]
		name = "-l"
		takesVal = true
		value = '^(emerg|alert|crit|err|warn|notice|info|debug)(,(emerg|alert|crit|err|warn|notice|info|debug))*$'
	[[commands.flags]]
		name = "--level"
		takesVal = true
		value = '^(emerg|alert|crit|err|warn|notice|info|debug)(,(emerg|alert|crit|err|warn|notice|info|debug))*$'
	[[commands.flags]]
		name = "-f"
		takesVal = true
		value = '^(kern|user|mail|daemon|auth|authpriv|syslog|lpr|news|uucp|cron|ftp|local0|local1|local2|local3|local4|local5|local6|local7)(,(kern|user|mail|daemon|auth|authpriv|syslog|lpr|news|uucp|cron|ftp|local[0-7]))*$'
	[[commands.flags]]
		name = "--facility"
		takesVal = true
		value = '^(kern|user|mail|daemon|auth|authpriv|syslog|lpr|news|uucp|cron|ftp|local0|local1|local2|local3|local4|local5|local6|local7)(,(kern|user|mail|daemon|auth|authpriv|syslog|lpr|news|uucp|cron|ftp|local[0-7]))*$'
  	[[commands.flags]]
   		name = "--time-format"
     	takesVal = true
      	value = '^(ctime|reltime|delta|notime|iso)$'

